<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" fill="none" aria-hidden="true">
  <!-- soft washes -->
  <circle cx="560" cy="160" r="140" fill="#E7DDD0" fill-opacity=".9"/>
  <circle cx="180" cy="520" r="160" fill="#D9E0D6" fill-opacity=".75"/>
  <circle cx="620" cy="480" r="90" fill="#E4E8EF" fill-opacity=".8"/>

  <!-- flowing chalk-like gesture lines (not boxes) -->
  <path d="M90 180c120-80 220-40 300 20 70 50 140 70 230 30" stroke="#1C1917" stroke-width="3" stroke-linecap="round" opacity=".35"/>
  <path d="M120 220c100-40 190 10 260 50" stroke="#1C1917" stroke-width="2" stroke-linecap="round" opacity=".2"/>

  <!-- abstract figure / brush body -->
  <path d="M310 140c40-50 120-60 170-20 40 34 44 100 10 150-30 44-90 70-140 55-60-18-80-90-40-185Z" fill="#1C1917" fill-opacity=".92"/>
  <path d="M360 210c30-10 70-8 100 12" stroke="#F6F1E8" stroke-width="6" stroke-linecap="round"/>
  <path d="M350 250c40-6 80 4 120-8" stroke="#F6F1E8" stroke-width="4" stroke-linecap="round" opacity=".7"/>

  <!-- hand-drawn botanical -->
  <g stroke="#3F5C4B" stroke-width="3.2" stroke-linecap="round" fill="none">
    <path d="M150 420c40-90 80-130 150-150"/>
    <path d="M210 360c-8 40-6 80 8 120"/>
    <path d="M245 340c4 36 2 78-12 118"/>
    <path d="M185 390c20 24 28 56 22 92"/>
    <path d="M280 300c-30-40 0-80 40-70"/>
    <path d="M300 280c-10-36 16-60 44-48"/>
  </g>

  <!-- ink splat / artistic mark -->
  <path d="M560 300c20-30 50-40 80-28 18 8 28 30 18 50-14 28-50 40-78 26-22-10-30-30-20-48Z" fill="#C45C26" fill-opacity=".85"/>
  <circle cx="620" cy="250" r="6" fill="#C45C26"/>
  <circle cx="650" cy="270" r="3.5" fill="#C45C26" fill-opacity=".7"/>
  <circle cx="590" cy="235" r="2.5" fill="#C45C26" fill-opacity=".6"/>

  <!-- pencil -->
  <g transform="translate(470 480) rotate(-32)">
    <rect width="170" height="16" rx="8" fill="#1C1917"/>
    <path d="M170 0 198 8 170 16Z" fill="#1C1917"/>
    <rect x="20" y="3" width="40" height="10" rx="5" fill="#F6F1E8"/>
    <rect x="100" y="3" width="22" height="10" rx="5" fill="#C45C26"/>
  </g>

  <!-- small handwritten swirl -->
  <path d="M520 560c40 30 80 20 120-10 20-16 40-20 60-10" stroke="#1C1917" stroke-width="2.5" stroke-linecap="round" opacity=".45"/>
</svg>
