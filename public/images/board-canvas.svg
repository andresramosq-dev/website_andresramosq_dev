    <circle cx="1300" cy="300" r="1.1"/><circle cx="200" cy="700" r="1.2"/><circle cx="1100" cy="800" r="1"/>
  </g>

  <!-- formas planas decorativas -->
  <circle cx="200" cy="150" r="70" fill="#ff7b72" opacity=".12"/>
