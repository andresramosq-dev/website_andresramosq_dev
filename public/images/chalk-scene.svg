  <path d="M1040 672h0.1M1060 672h0.1" stroke="#F4EBD9" stroke-width="3" stroke-linecap="round" opacity=".45"/>
  <path d="M1042 688c6 8 14 8 20 0" stroke="#F4EBD9" stroke-width="2.5" stroke-linecap="round" opacity=".45"/>
