<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" fill="none" aria-hidden="true">
  <rect width="1600" height="1100" fill="#2A2F38"/>
  <!-- dust -->
  <g fill="#F4EBD9" fill-opacity=".07">
    <circle cx="80" cy="70" r="1.5"/><circle cx="140" cy="120" r="1"/><circle cx="220" cy="40" r="1.2"/>
    <circle cx="400" cy="90" r="1"/><circle cx="900" cy="60" r="1.4"/><circle cx="1200" cy="100" r="1"/>
    <circle cx="1400" cy="80" r="1.3"/><circle cx="150" cy="900" r="1"/><circle cx="700" cy="980" r="1.2"/>
    <circle cx="1300" cy="940" r="1.5"/><circle cx="1000" cy="500" r="1"/><circle cx="500" cy="600" r="1.1"/>
  </g>

  <!-- outer chalk frame -->
  <rect x="36" y="30" width="1528" height="1040" rx="8" stroke="#F4EBD9" stroke-opacity=".35" stroke-width="3" stroke-dasharray="10 8"/>

  <!-- left plant -->
  <g stroke="#C9D6C3" stroke-width="3.5" stroke-linecap="round">
    <path d="M120 820c40-120 70-180 130-220"/>
    <path d="M180 700c10 40 8 80-10 120"/>
    <path d="M210 680c16 36 18 78 6 120"/>
    <path d="M150 740c18 28 22 60 12 96"/>
    <path d="M240 660c-20-40 10-70 40-60"/>
  </g>

  <!-- coffee -->
  <g stroke="#F4EBD9" stroke-width="3.5" stroke-linecap="round">
    <path d="M1280 220h90c10 0 18 8 18 18v70c0 40-32 72-72 72h-20c-40 0-72-32-72-72v-70c0-10 8-18 18-18h38Z"/>
    <path d="M1388 250h28c18 0 32 14 32 32s-14 32-32 32h-20"/>
    <path d="M1310 190c8-20 28-28 44-14" stroke="#D7E3F0"/>
    <path d="M1340 185c6-16 22-24 36-12" stroke="#D7E3F0"/>
  </g>

  <!-- open book -->
  <g stroke="#F4EBD9" stroke-width="3.2">
    <path d="M980 700c40-20 90-20 130 0v150c-40-18-90-18-130 0V700Z"/>
    <path d="M980 700c-40-20-90-20-130 0v150c40-18 90-18 130 0V700Z"/>
    <path d="M900 760h50M890 795h60M900 830h45" stroke-width="2.5" opacity=".55"/>
    <path d="M1010 760h50M1010 795h60M1020 830h40" stroke-width="2.5" opacity=".55"/>
  </g>

  <!-- lightbulb -->
  <g stroke="#F3D9A4" stroke-width="3.5" stroke-linecap="round">
    <path d="M250 250a55 55 0 0 1 34 96c-8 8-14 18-14 30v10h-40v-10c0-12-6-22-14-30a55 55 0 0 1 34-96Z"/>
    <path d="M230 400h40M236 420h28"/>
    <path d="M250 270v28M210 300l18 12M290 300l-18 12"/>
  </g>

  <!-- stars -->
  <path d="m720 160 10 26h28l-22 17 8 28-24-17-24 17 8-28-22-17h28l10-26Z" stroke="#F3D9A4" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="m1480 520 8 20h22l-17 13 6 22-19-13-19 13 6-22-17-13h22l8-20Z" stroke="#F4EBD9" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="m420 520 7 18h19l-15 11 5 19-16-11-16 11 5-19-15-11h19l7-18Z" stroke="#F4EBD9" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- banner -->
  <path d="M560 80c50-24 180-28 260-4 20 8 24 28 6 40l-40 24c-14 8-20 8-34 0l-40-22c-54-30-160-34-230-4-16 8-24-4-12-20l30-20c14-10 30-6 60 6Z" stroke="#F4EBD9" stroke-width="3"/>
  <path d="M640 118c50-8 120-6 180 6" stroke="#F4EBD9" stroke-width="4" stroke-linecap="round"/>

  <!-- arrows connecting zones -->
  <g stroke="#F4EBD9" stroke-width="3" stroke-linecap="round" opacity=".7">
    <path d="M340 360c80 20 140 80 170 150"/>
    <path d="M500 500c8 10 12 16 14 24m0 0c-10-2-16-2-24 0"/>
    <path d="M860 280c60 40 100 110 120 180"/>
    <path d="M970 450c6 10 10 16 10 24m0 0c-10 0-16 2-24 4"/>
    <path d="M1180 420c40 80 40 160 10 240"/>
    <path d="M1195 650c-8 8-12 12-20 14"/>
    <path d="M520 860c120 10 240-20 340-70"/>
    <path d="M850 800c8-6 14-8 22-8"/>
  </g>

  <!-- chalk rectangles drawn unevenly (art frames, not UI cards) -->
  <g stroke="#F4EBD9" stroke-width="3" stroke-linecap="round" opacity=".5">
    <path d="M520 300 820 290 835 490 510 510Z"/>
    <path d="M980 300 1280 320 1260 540 970 530Z"/>
    <path d="M180 560 470 545 490 760 170 780Z"/>
    <path d="M1100 700 1420 690 1435 900 1090 920Z"/>
  </g>

  <!-- tape marks -->
  <g fill="#F4EBD9" fill-opacity=".12" stroke="#F4EBD9" stroke-width="2">
    <rect x="560" y="278" width="70" height="18" transform="rotate(-8 560 278)"/>
    <rect x="1180" y="308" width="70" height="18" transform="rotate(6 1180 308)"/>
    <rect x="250" y="540" width="70" height="18" transform="rotate(-5 250 540)"/>
  </g>

  <!-- small doodle faces / marks -->
  <g stroke="#F4EBD9" stroke-width="2.5" stroke-linecap="round">
    <circle cx="1500" cy="220" r="22"/>
    <path d="M1490 214h0.1M1510 214h0.1"/>
    <path d="M1492 230c6 8 14 8 20 0"/>
    <path d="M620 980c40-30 80-30 120 0" opacity=".6"/>
  </g>

  <!-- chalk sticks bottom -->
  <rect x="80" y="1000" width="120" height="14" rx="7" fill="#F4EBD9" fill-opacity=".85"/>
  <rect x="210" y="1004" width="50" height="8" rx="4" fill="#D7E3F0"/>
  <rect x="280" y="1024" width="90" height="12" rx="6" fill="#E7C4B8" fill-opacity=".9"/>
</svg>
