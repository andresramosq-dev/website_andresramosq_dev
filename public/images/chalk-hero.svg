<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" fill="none" role="img" aria-labelledby="chalkTitle">
  <title id="chalkTitle">Ilustración de pizarra artística</title>
  <rect width="640" height="420" rx="28" fill="#24302c"/>
  <rect x="18" y="18" width="604" height="384" rx="18" stroke="#e8e2d4" stroke-opacity="0.22" stroke-width="2"/>
  <!-- chalk dust -->
  <g stroke="#f2ebe0" stroke-opacity="0.12" stroke-width="1">
    <path d="M70 80c40-20 70 10 110-5"/>
    <path d="M420 70c35 15 55-10 90 8"/>
    <path d="M90 330c50 18 90-12 140 10"/>
  </g>
  <!-- abstract window / board -->
  <rect x="86" y="96" width="210" height="150" rx="12" stroke="#f2ebe0" stroke-width="3"/>
  <path d="M86 140h210" stroke="#f2ebe0" stroke-width="2" stroke-opacity="0.55"/>
  <circle cx="112" cy="118" r="6" fill="#f2ebe0" fill-opacity="0.7"/>
  <circle cx="132" cy="118" r="6" fill="#f2ebe0" fill-opacity="0.45"/>
  <circle cx="152" cy="118" r="6" fill="#f2ebe0" fill-opacity="0.3"/>
  <!-- code lines -->
  <path d="M118 170h120M118 192h86M118 214h104" stroke="#d7e3c8" stroke-width="4" stroke-linecap="round" stroke-opacity="0.85"/>
  <!-- chalk figure / mark -->
  <path d="M360 280c40-90 90-120 150-130" stroke="#f2ebe0" stroke-width="5" stroke-linecap="round"/>
  <path d="M390 170c28 8 48 34 54 62" stroke="#c9d7b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="520" cy="148" r="18" stroke="#f2ebe0" stroke-width="4"/>
  <!-- sticky notes flat -->
  <rect x="360" y="220" width="72" height="72" rx="8" fill="#e7dfc8" fill-opacity="0.9"/>
  <rect x="448" y="248" width="72" height="72" rx="8" fill="#cfd9c0" fill-opacity="0.85"/>
  <path d="M376 248h40M376 266h28" stroke="#2a342f" stroke-width="3" stroke-linecap="round"/>
  <path d="M464 276h40M464 294h24" stroke="#2a342f" stroke-width="3" stroke-linecap="round"/>
  <!-- eraser / chalk bar -->
  <rect x="120" y="300" width="96" height="18" rx="9" fill="#f2ebe0" fill-opacity="0.85"/>
  <rect x="230" y="304" width="46" height="10" rx="5" fill="#d7e3c8"/>
</svg>
